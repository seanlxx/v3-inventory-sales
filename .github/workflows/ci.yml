name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Build, test, and validate D1 migrations
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static site
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Run regression tests
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Validate local D1 migrations
        run: npx --yes wrangler@latest d1 migrations apply v3-vending-inventory-sales-db --local
