name: Shengma Auto Sync

on:
  schedule:
    # GitHub Actions 最小调度粒度为 5 分钟
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync ignoring schedule (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: shengma-auto-sync
  cancel-in-progress: false

jobs:
  trigger:
    name: Trigger Pages /auto-trigger
    runs-on: ubuntu-latest
    steps:
      - name: Call auto-trigger
        env:
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          CRON_TOKEN: ${{ secrets.SHENGMA_CRON_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          if [ -z "${PAGES_BASE_URL:-}" ]; then
            echo "PAGES_BASE_URL is not configured (set repo variable)." >&2
            exit 1
          fi
          if [ -z "${CRON_TOKEN:-}" ]; then
            echo "SHENGMA_CRON_TOKEN secret is not configured." >&2
            exit 1
          fi

          payload='{}'
          if [ "${FORCE:-false}" = "true" ]; then
            payload='{"force":true}'
          fi

          response=$(mktemp)
          status=$(curl -sS -o "$response" -w '%{http_code}' \
            -X POST "${PAGES_BASE_URL%/}/api/integrations/shengma/auto-trigger" \
            -H 'content-type: application/json' \
            -H "x-cron-token: ${CRON_TOKEN}" \
            --data "$payload" \
            --max-time 240)

          echo "HTTP $status"
          cat "$response"
          echo

          if [ "$status" -ge 400 ]; then
            exit 1
          fi
